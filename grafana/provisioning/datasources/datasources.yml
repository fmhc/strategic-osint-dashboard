apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "10s"
  
  - name: OSINT Backend JSON
    type: grafana-simple-json-datasource
    access: proxy
    url: http://osint-backend:3000
    isDefault: false
    editable: true

