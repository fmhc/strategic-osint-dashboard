<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="targetGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff3355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0040;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" fill="#000408"/>
  <!-- Target rings -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#00c8ff" stroke-width="2" opacity="0.8"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#00c8ff" stroke-width="2" opacity="0.9"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="#00c8ff" stroke-width="2"/>
  <circle cx="32" cy="32" r="10" fill="none" stroke="#ffa000" stroke-width="2"/>
  <!-- Bullseye -->
  <circle cx="32" cy="32" r="6" fill="url(#targetGrad)"/>
  <circle cx="32" cy="32" r="2" fill="#ffffff"/>
  <!-- Crosshairs -->
  <line x1="8" y1="32" x2="20" y2="32" stroke="#00c8ff" stroke-width="1" opacity="0.7"/>
  <line x1="44" y1="32" x2="56" y2="32" stroke="#00c8ff" stroke-width="1" opacity="0.7"/>
  <line x1="32" y1="8" x2="32" y2="20" stroke="#00c8ff" stroke-width="1" opacity="0.7"/>
  <line x1="32" y1="44" x2="32" y2="56" stroke="#00c8ff" stroke-width="1" opacity="0.7"/>
</svg>